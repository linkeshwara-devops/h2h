<article class="product-card glass float-card">
    <img src="{{ product.image_url }}" alt="{{ product.name }}">
    <div class="product-content">
        <div class="product-meta">
            <span>{{ product.category.name }}</span>
            <span>{{ product.rating }} ★</span>
        </div>
        <h3>{{ product.name }}</h3>
        <p>{{ product.short_description }}</p>
        <div class="supplier-row">
            <a href="{{ url_for('manufacturer_store', manufacturer_id=product.manufacturer.id) }}">{{ product.manufacturer.company_name }}</a>
            <span>{{ product.origin }}</span>
        </div>
        <div class="price-row">
            <strong>₹{{ "%.0f"|format(product.price_per_kg) }}/kg</strong>
            <small>MOQ {{ product.min_order_quantity }} kg</small>
        </div>
        <div class="card-actions">
            <a class="btn btn-secondary" href="{{ url_for('product_detail', product_id=product.id) }}">View Details</a>
            <form method="post" action="{{ url_for('add_to_cart', product_id=product.id) }}">
                <input type="hidden" name="quantity" value="{{ product.min_order_quantity }}">
                <button class="btn btn-primary" type="submit">Add MOQ</button>
            </form>
        </div>
    </div>
</article>
