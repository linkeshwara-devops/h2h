{% extends "base.html" %}
{% block content %}
<section class="auth-layout">
    <div class="glass auth-card float-card">
        <span class="eyebrow">Sign In</span>
        <h1>Access your Harvest2Hotel account</h1>
        <p>Use the demo buyer account `buyer@demo.com` / `demo123` or manufacturer account `raghav@greenpulse.com` / `demo123`.</p>
        <form method="post" class="form-grid">
            <label>Email<input type="email" name="email" required></label>
            <label>Password<input type="password" name="password" required></label>
            <button class="btn btn-primary" type="submit">Login</button>
        </form>
        <p class="muted">New here? <a href="{{ url_for('register') }}">Create an account</a></p>
    </div>
</section>
{% endblock %}
